<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotional Orb</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  touch-action:none;
}

/* ORB */
#orb{
  position:fixed;
  top:50%;
  left:50%;
  width:210px;
  height:210px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, #00e5ff, #003355);
  box-shadow:0 0 140px rgba(0,200,255,0.5);
}

/* TEXT */
#tutorial{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:16px;
}

/* FINAL (FIXED) */
#final{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.97);
  color:white;

  display:none;

  justify-content:center;
  align-items:center;

  padding:40px;

  text-align:center;

  white-space:pre-wrap;
  line-height:1.8;

  font-size:22px;
  max-width:900px;
  margin:auto;
}
</style>
</head>

<body>

<button id="startAudio">Start Experience</button>

<div id="tutorial"></div>
<div id="orb"></div>
<div id="final"></div>

<audio id="music" src="music.mp3" preload="auto"></audio>

<script>

const orb = document.getElementById("orb");
const tutorial = document.getElementById("tutorial");
const finalScreen = document.getElementById("final");
const music = document.getElementById("music");
const startAudio = document.getElementById("startAudio");

/* =========================
   STATE LOCK
========================= */

let started = false;
let targetEnergy = 0;
let energy = 0;
let touched = false;
let touchUnlocked = false;

/* =========================
   MUSIC
========================= */

startAudio.addEventListener("click", async (e) => {

  e.stopPropagation();

  try{
    music.volume = 0;
    await music.play();

    gsap.to(music, {
      volume: 0.4,
      duration: 2
    });

    startAudio.style.display = "none";

    started = true;

    render();
    shakeLoop();

  }catch(err){
    console.log("music error:", err);
  }
});

/* =========================
   SHAKE
========================= */

function shakeLoop(){

  if(!started) return;

  let intensity = (1 - energy) * 10;

  gsap.to(orb,{
    x:(Math.random()-0.5)*intensity,
    y:(Math.random()-0.5)*intensity,
    duration:0.25,
    onComplete:shakeLoop
  });
}

/* =========================
   ENERGY
========================= */

function updateEnergy(){
  energy += (targetEnergy - energy) * 0.03;
}

function addEnergy(v){

  let resistance = 1 - targetEnergy;
  targetEnergy += v * resistance;

  if(targetEnergy > 0.72){
    touchUnlocked = true;
  }

  targetEnergy = Math.max(0, Math.min(1, targetEnergy));
}

/* =========================
   INPUT
========================= */

let lastScroll = 0;

window.addEventListener("wheel",(e)=>{

  if(!started) return;

  if(e.deltaY < 0){

    let now = Date.now();
    if(now - lastScroll < 200) return;

    lastScroll = now;

    addEnergy(0.01);
  }
});

let startY = null;

window.addEventListener("touchstart",(e)=>{

  if(!started) return;

  startY = e.touches[0].clientY;
});

window.addEventListener("touchmove",(e)=>{

  if(!started) return;

  let y = e.touches[0].clientY;
  let diff = startY - y;

  if(diff > 0) addEnergy(diff * 0.0008);

  startY = y;
});

/* =========================
   TOUCH ACTION
========================= */

orb.addEventListener("pointerdown",(e)=>{

  if(!started) return;

  e.stopPropagation();

  if(!touchUnlocked || touched) return;

  touched = true;

  tutorial.innerText = "Safe";

  gsap.killTweensOf(orb);

  orb.style.background =
    "radial-gradient(circle, #ffb347, #ff5e00)";

  orb.style.boxShadow =
    "0 0 200px rgba(255,180,71,0.9), 0 0 400px rgba(255,94,0,0.8)";

  gsap.to(orb,{
    scale:2,
    duration:1.2,
    ease:"elastic.out(1,0.6)"
  });

  setTimeout(showFinalScene, 2000);
});

/* =========================
   TUTORIAL
========================= */

function updateTutorial(){

  if(!started) return;
  if(touched) return;

  if(energy < 0.2){
    tutorial.innerText = "It feels scared… Scroll up";
  }
  else if(energy < 0.4){
    tutorial.innerText = "It notices you";
  }
  else if(energy < 0.6){
    tutorial.innerText = "It adapts";
  }
  else if(energy < 0.72){
    tutorial.innerText = "Almost stable";
  }
  else{
    tutorial.innerText = "Touch now";
  }
}

/* =========================
   LOOP
========================= */

function render(){

  if(!started) return;

  updateEnergy();
  updateTutorial();

  let scale = 1 + energy * 0.7;

  if(!touched){

    let r = Math.floor(30 + energy * 220);
    let g = Math.floor(200 + energy * 40);
    let b = Math.floor(255 - energy * 200);

    orb.style.background =
      `radial-gradient(circle, rgb(${r},${g},${b}), #001a33)`;

    orb.style.boxShadow =
      `0 0 ${120 + energy*400}px rgba(${r},${g},${b},0.7)`;
  }

  gsap.to(orb,{
    scale:scale,
    duration:0.8,
    ease:"power3.out"
  });

  requestAnimationFrame(render);
}

/* =========================
   FINAL MESSAGE
========================= */

const text = `Everything I felt… reacted like a person… because it was a person.
And maybe… it was me.
This is how I always felt when you were there.
When you were here… I was never alone in anything I went through.
I might have gone through all of this anyway…
but I know it wouldn’t have felt the same without you shaping how I lived it.
And this is the reason I made this site:
I don’t take anything for granted.
I just want to appreciate you… so I don’t lose what made me feel this way.`;

function showFinalScene(){

  finalScreen.style.display = "flex";
  finalScreen.innerHTML = "";

  gsap.fromTo(finalScreen,
    {opacity:0},
    {opacity:1,duration:2,onComplete:typeWriter}
  );
}

/* =========================
   TYPEWRITER
========================= */

function typeWriter(){

  let i = 0;

  function step(){

    if(i < text.length){

      finalScreen.innerHTML += text[i];

      let delay = 40;

      if(text[i] === ".") delay = 450;
      if(text[i] === ",") delay = 180;
      if(text[i] === "…") delay = 600;

      i++;
      setTimeout(step, delay);
    }
  }

  step();
}

</script>

</body>
</html>
